<!DOCTYPE html>
<html>
  <head>
    <title>Ad Loader</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f4f4;
      }

      .page-shade {
        background: #e8e8e8;
        padding: 20px 0;
        min-height: 100vh;
      }

      #content-modal {
        width: 90%;
        max-width: 700px;
        margin: 40px auto;
        padding: 20px;
        background: #fff;
        box-shadow: 0 4px 25px rgba(0, 0, 0, 0.15);
        border-radius: 10px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      #img-placeholder {
        width: 100%;
        aspect-ratio: 16/9;
        background: #000;
        border-radius: 8px;
        margin-top: 15px;
      }

      #progress-container {
        width: 100%;
        height: 12px;
        background: #ddd;
        border-radius: 6px;
        margin-top: 20px;
        overflow: hidden;
      }

      #progress-bar {
        width: 0%;
        height: 100%;
        background: #4caf50;
        transition: width 0.1s linear;
      }

      #blocked-message,
      #bot-block {
        display: none;
        padding: 20px;
        text-align: center;
        font-size: 1rem;
        background: #ffe5e5;
        border: 1px solid #ff8a8a;
        width: 90%;
        max-width: 700px;
        margin: 40px auto;
        border-radius: 10px;
      }

      /* Hidden pixel for resource test */
      #tracker {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
      }

      /* Ellipsis loader */
      #ellipsis {
        font-size: 1.2rem;
        font-weight: bold;
        letter-spacing: 2px;
      }

      #ellipsis::after {
        content: "...";
        animation: ellipsis 1s infinite steps(3);
      }

      @keyframes ellipsis {
        0% {
          content: "";
        }
        33% {
          content: ".";
        }
        66% {
          content: "..";
        }
        100% {
          content: "...";
        }
      }
    </style>
    <!-- Meta Pixel Code -->

  </head>

  <body>
    <!-- Hidden asset test pixel -->
    <img id="tracker" src="/pixel.png" />

    <div class="page-shade">
      <div id="content-modal">
        <h2 id="ellipsis">Loading Video</h2>

        <!-- <img id="img-placeholder" src="filter1_image.jpeg" /> -->

        <div id="progress-container">
          <div id="progress-bar"></div>
        </div>
      </div>
    </div>

    <div id="blocked-message">
      Sorry, this ad cannot be displayed in your region.
    </div>
    <div id="bot-block">
      Automated activity detected. Content cannot be loaded.
    </div>

  <script>
  // Start loader immediately
  startProgressBar();

  function startProgressBar() {
    const bar = document.getElementById("progress-bar");
    let width = 0;

    const duration = 3000;
    const interval = 10;
    const step = (interval / duration) * 100;

    const timer = setInterval(() => {
      width += step;
      bar.style.width = width + "%";

      if (width >= 100) {
        bar.style.width = "100%";
        clearInterval(timer);
        finalize();
      }
    }, interval);
  }

  function finalize() {
    const modal = document.getElementById("content-modal");

    modal.innerHTML = `
      <h1 style="color:#d32f2f; font-weight: bold;">
        Click below to watch full video
      </h1>

    <!--  <p style="font-size: 1.05rem; margin-top: 15px;">
        You are about to watch a rare moment caught on camera.<br><br>
        Most people are not prepared for what happened seconds later.
      </p>

      <p style="margin-top: 15px; font-weight: bold;">
        ▶ Watch the full video. Tap the button below to watch the unedited video.
      </p> -->

      <button onclick="goToOffer()" 
        style="
          margin-top: 20px;
          padding: 14px 24px;
          font-size: 1rem;
          background: #4caf50;
          color: #fff;
          border: none;
          border-radius: 6px;
          cursor: pointer;
        ">
        Watch Now
      </button>
    `;
  }

  function goToOffer() {
    window.location.href = "https://www.effectivegatecpm.com/kbi6s9byhe?key=59dff4b82b1e7ede56b57d1cfb7de974";
  }
</script>
    
  </body>
</html>
